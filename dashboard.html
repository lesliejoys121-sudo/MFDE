<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TriageCenter | Neural Defense Grid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070913;
            --surface: #0f1325;
            --surface-hover: #1a203a;
            --accent: #3b82f6;
            --neon-green: #10b981;
            --neon-red: #ef4444;
            --glass: rgba(15, 19, 37, 0.6);
            --border: rgba(59, 130, 246, 0.15);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #d1d5db;
            overflow: hidden;
            /* Grid background pattern */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.05) 0%, transparent 60%),
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
        }
        
        .pulse-border {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.5);
        }

        .btn-reply {
            background: linear-gradient(180deg, #22c55e 0%, #16a34a 100%);
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.3), inset 0 2px 4px rgba(255,255,255,0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-ignore {
            background: linear-gradient(180deg, #374151 0%, #1f2937 100%);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4), inset 0 2px 4px rgba(255,255,255,0.1);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn-escalate {
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3), inset 0 2px 4px rgba(255,255,255,0.3);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .btn-hover:hover { transform: translateY(-2px) scale(1.02); }
        .btn-active:active { transform: translateY(2px) scale(0.98); }

        [x-cloak] { display: none !important; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.2); border-radius: 10px; }
    </style>
</head>
<body x-data="triageApp()" x-init="initApp()" class="h-screen flex flex-col p-6 gap-6 relative">

    <!-- HEADER OVERLAY (Hidden background glow elements) -->
    <div class="absolute top-0 left-1/4 w-[50vw] h-[20vh] bg-blue-600/10 blur-[120px] rounded-full pointer-events-none z-0"></div>

    <!-- MAIN HEADER -->
    <header class="flex justify-between items-center z-10 px-4 shrink-0">
        <!-- Logo & Title -->
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center font-black text-2xl text-white shadow-[0_0_20px_rgba(37,99,235,0.5)]">M</div>
            <div>
                <h1 class="text-xl font-black text-white tracking-tight">TriageCenter</h1>
                <p class="text-[9px] font-black tracking-[0.2em] text-blue-400 uppercase">Neural Defense Grid</p>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="flex flex-col items-center justify-center w-64 pr-16 relative">
            <div class="w-full flex justify-between items-center mb-2">
                <span class="text-[8px] font-black tracking-widest text-gray-500 uppercase">Expertise Rank</span>
                <span class="text-[10px] font-black tracking-widest text-blue-400 uppercase" x-text="perf.rank">NOVICE ANALYST</span>
            </div>
            <div class="w-full h-1.5 bg-gray-800 rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 shadow-[0_0_10px_rgba(59,130,246,0.8)] transition-all duration-1000" :style="'width: ' + perf.progress_percent + '%'"></div>
            </div>
        </div>

        <!-- XP Badges -->
        <div class="flex items-center gap-4">
            <div class="glass-panel px-6 py-2 flex flex-col items-center justify-center border-white/10">
                <span class="text-[8px] font-black uppercase text-gray-500 tracking-widest">Total XP</span>
                <span class="text-xl font-black text-white" x-text="perf.total_score.toFixed(2)">0</span>
            </div>
            
            <!-- Task Switcher (Replaces the basic select, keeping it integrated aesthetic) -->
            <div class="relative glass-panel rounded-xl overflow-hidden border-white/10 group cursor-pointer">
                <select x-model="selectedTask" @change="loadInbox()" class="appearance-none bg-transparent w-full h-full text-xs font-bold text-gray-300 py-4 px-6 focus:outline-none cursor-pointer hover:bg-white/5 transition-colors uppercase tracking-widest relative z-10 w-48">
                    <option value="easy" class="bg-gray-900">Easy Target (1.0x)</option>
                    <option value="medium" class="bg-gray-900">Medium Vector (2.0x)</option>
                    <option value="hard" class="bg-gray-900">Hard Alert (3.0x)</option>
                    <option value="stress_test" class="bg-gray-900">STRESS TEST (5.0x)</option>
                    <option value="gmail" class="bg-gray-900">Live Telemetry</option>

                </select>
                <!-- Arrow -->
                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500 z-0">▼</div>
            </div>
        </div>
    </header>

    <!-- CONTENT BODY -->
    <main class="flex-1 flex gap-6 overflow-hidden z-10 relative">
        
        <!-- SIDEBAR -->
        <aside class="flex flex-col gap-4 w-64 shrink-0 h-full justify-between">
            <nav class="flex flex-col gap-3 mt-4">
                <button @click="currentTab = 'simulation'" 
                        :class="currentTab === 'simulation' ? 'pulse-border bg-[#1a203a] text-white shadow-[inset_0_0_20px_rgba(59,130,246,0.1)]' : 'border-transparent text-gray-500 hover:text-gray-300 hover:bg-gray-800/50'"
                        class="glass-panel w-full p-4 flex items-center gap-4 transition-all rounded-2xl group border">
                    <div class="w-8 h-8 rounded-lg bg-blue-500/20 flex items-center justify-center text-blue-400 border border-blue-500/30 group-hover:scale-110 transition-transform">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"></path><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"></path></svg>
                    </div>
                    <span class="font-black text-[11px] tracking-widest uppercase">Triage Inbox</span>
                </button>
                
                <button @click="currentTab = 'scanner'" 
                        :class="currentTab === 'scanner' ? 'pulse-border bg-[#1a203a] text-white shadow-[inset_0_0_20px_rgba(59,130,246,0.1)]' : 'border-transparent text-gray-500 hover:text-gray-300 hover:bg-gray-800/50'"
                        class="glass-panel w-full p-4 flex items-center gap-4 transition-all rounded-2xl group border">
                    <div class="w-8 h-8 rounded-lg bg-indigo-500/20 flex items-center justify-center text-indigo-400 border border-indigo-500/30 group-hover:scale-110 transition-transform">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                    </div>
                    <span class="font-black text-[11px] tracking-widest uppercase">Pro-Scanner</span>
                </button>

                <button @click="openAnalytics()" 
                        :class="currentTab === 'analytics' ? 'pulse-border bg-[#1a203a] text-white shadow-[inset_0_0_20px_rgba(59,130,246,0.1)]' : 'border-transparent text-gray-500 hover:text-gray-300 hover:bg-gray-800/50'"
                        class="glass-panel w-full p-4 flex items-center gap-4 transition-all rounded-2xl group border">
                    <div class="w-8 h-8 rounded-lg bg-purple-500/20 flex items-center justify-center text-purple-400 border border-purple-500/30 group-hover:scale-110 transition-transform">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
                    </div>
                    <span class="font-black text-[11px] tracking-widest uppercase">Analytics Yield</span>
                </button>

                <button @click="openMatrix()" 
                        :class="currentTab === 'matrix' ? 'pulse-border bg-[#1a203a] text-white shadow-[inset_0_0_20px_rgba(59,130,246,0.1)]' : 'border-transparent text-gray-500 hover:text-gray-300 hover:bg-gray-800/50'"
                        class="glass-panel w-full p-4 flex items-center gap-4 transition-all rounded-2xl group border">
                    <div class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center text-red-400 border border-red-500/30 group-hover:scale-110 transition-transform">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.395 2.553a1 1 0 00-1.4503-.321c-2.43 1.258-4.706 2.552-7.109 3.462a.707.707 0 00-.375.494c-.512 3.146.351 6.19 2.598 9.16a1 1 0 00.1.115c2.1 2.307 4.666 3.69 7.69 4.09a.703.703 0 00.465-.075c3.078-1.335 5.258-3.303 6.54-5.903a.677.677 0 00.041-.335c-.035-3.328-1.123-6.446-3.26-9.109a1 1 0 00-.1-.115c-1.554-1.631-3.415-2.73-5.518-3.462z" clip-rule="evenodd"></path></svg>
                    </div>
                    <span class="font-black text-[11px] tracking-widest uppercase">Threat Matrix</span>
                </button>

            </nav>
            
            <!-- SYSTEM CORE BADGE -->
            <div class="glass-panel p-5 rounded-2xl border-blue-500/20 flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 bg-blue-500/5 blur-xl"></div>
                <span class="relative text-[8px] font-black text-blue-500 tracking-[0.2em] uppercase mb-1">System Core</span>
                <span class="relative text-xs font-bold text-white mb-3">Node Active: 104-B</span>
                <div class="relative w-full h-[2px] bg-gray-800 rounded-full">
                    <div class="w-2/3 h-full bg-blue-400 shadow-[0_0_5px_#3b82f6]"></div>
                </div>
            </div>
        </aside>

        <!-- TRIAGE TAB (Inbox + Detail) -->
        <div x-show="currentTab === 'simulation' || currentTab === 'gmail'" class="flex-1 flex gap-6 min-h-0 relative">
            
            <!-- OPERATIONAL QUEUE -->
            <div class="w-80 flex flex-col shrink-0 h-full relative">
                <!-- Title Row -->
                <div class="flex justify-between items-center mb-4 px-2">
                    <h2 class="text-[10px] font-black uppercase text-gray-500 tracking-widest">Operational Queue</h2>
                    <span class="px-3 py-1 bg-blue-900/40 text-blue-400 text-[9px] font-black rounded-full border border-blue-500/20" x-text="inbox.length + ' TARGETS'"></span>
                </div>
                
                <!-- Queue List -->
                <div class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3">
                    <template x-for="(email, idx) in inbox" :key="email.id">
                        <div @click="openEmail(email)"
                             :class="selectedEmail && selectedEmail.id === email.id ? 'border-blue-500 bg-blue-900/10 shadow-[0_0_15px_rgba(37,99,235,0.15)]' : 'border-gray-800 bg-gray-900/30 hover:border-gray-700'"
                             class="glass-panel p-5 cursor-pointer transition-all border rounded-2xl relative overflow-hidden group">
                           
                            <!-- Active Status Pip -->
                            <div class="absolute top-5 right-5 w-1.5 h-1.5 rounded-full" :class="selectedEmail && selectedEmail.id === email.id ? 'bg-blue-400 shadow-[0_0_5px_#60a5fa]' : 'bg-gray-700'"></div>
                            
                            <!-- Sender Tag -->
                            <div class="inline-block px-2 py-0.5 bg-blue-500/10 text-blue-400 text-[8px] font-black rounded uppercase tracking-widest mb-2 border border-blue-500/20" 
                                 x-text="email.sender.split('@')[0].substring(0, 10)"></div>
                            
                            <!-- Subject -->
                            <h3 class="font-bold text-gray-200 text-sm mb-1 truncate group-hover:text-white transition-colors" x-text="email.subject"></h3>
                            
                            <!-- Snippet -->
                            <p class="text-xs text-gray-500 truncate" x-text="email.body"></p>
                        </div>
                    </template>
                    <template x-if="inbox.length === 0">
                        <div class="flex-1 flex items-center justify-center text-gray-600 text-[10px] font-black uppercase tracking-widest border border-dashed border-gray-800 rounded-2xl">
                            Queue Empty
                        </div>
                    </template>
                </div>
            </div>

            <!-- MAIN EMAIL DETAIL VIEW -->
            <div class="flex-1 glass-panel border bg-[#0a0d1a]/80 backdrop-blur-2xl rounded-3xl flex flex-col overflow-hidden relative border-white/5 border-t-white/10 shadow-2xl">
                
                <template x-if="selectedEmail">
                    <div class="flex flex-col h-full z-10 animate-fadeIn">
                        <!-- Detail Header -->
                        <div class="p-10 shrink-0 relative">
                            <!-- Background typography watermark -->
                            <div class="absolute right-10 top-10 text-[120px] font-black text-white/[0.01] uppercase tracking-tighter leading-none select-none pointer-events-none">TARGET</div>
                            
                            <div class="flex justify-between items-start mb-6 w-full">
                                <h1 class="text-4xl font-black text-white tracking-tight break-words max-w-3xl leading-tight drop-shadow-lg" x-text="selectedEmail.subject"></h1>
                                <div class="glass-panel px-4 py-2 border-white/10 flex flex-col items-center ml-4 shrink-0 shadow-lg">
                                    <span class="text-[8px] font-black uppercase tracking-widest text-gray-500 mb-0.5">Node ID</span>
                                    <span class="text-lg font-black text-blue-400" x-text="'#' + selectedEmail.id"></span>
                                </div>
                            </div>
                            
                            <div class="flex items-center gap-4 mt-2">
                                <div class="w-12 h-12 bg-indigo-500/20 text-indigo-400 font-bold text-xl rounded-full flex items-center justify-center border border-indigo-500/30 shadow-inner block shrink-0" 
                                     x-text="selectedEmail.sender.charAt(0).toUpperCase()"></div>
                                <div>
                                    <h2 class="text-lg font-bold text-gray-200" x-text="selectedEmail.sender"></h2>
                                    <div class="flex items-center gap-1.5 mt-0.5">
                                        <div class="w-1.5 h-1.5 bg-green-500 rounded-full shadow-[0_0_5px_#22c55e]"></div>
                                        <p class="text-[9px] font-black uppercase tracking-[0.2em] text-green-500">Verified Target</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Email Body content -->
                        <div class="flex-1 overflow-y-auto px-10 pb-10 flex items-center justify-center">
                            <div class="w-full max-w-4xl glass-panel p-10 bg-black/40 border-gray-800 rounded-3xl min-h-[200px] flex items-center justify-center shadow-inner relative overflow-hidden group">
                                <p class="text-lg text-gray-300 font-medium leading-relaxed relative z-10 text-center" x-text="selectedEmail.body"></p>
                            </div>
                        </div>

                        <!-- ACTIONS FOOTER -->
                        <div class="p-8 shrink-0 relative flex flex-col items-center z-20">
                            <!-- Divider line -->
                            <div class="absolute top-0 left-1/2 -translate-x-1/2 w-4/5 flex items-center justify-center">
                                <div class="h-px w-full bg-gradient-to-r from-transparent via-gray-700 to-transparent"></div>
                                <span class="absolute bg-[#0a0d1a] px-4 text-[8px] font-black tracking-[0.3em] uppercase text-gray-600">Secure Operational Override</span>
                            </div>
                            
                            <div class="pt-8 flex items-stretch gap-6 w-full max-w-4xl justify-center">
                                
                                <!-- Triage Buttons -->
                                <button @click="submitTriage('reply', 'medium')" :disabled="isTriageProcessing"
                                        class="btn-reply flex-1 py-5 rounded-2xl font-black text-xl text-white tracking-wide btn-hover btn-active disabled:opacity-50 disabled:cursor-not-allowed">
                                    REPLY
                                </button>
                                
                                <button @click="submitTriage('ignore', 'low')" :disabled="isTriageProcessing"
                                        class="btn-ignore flex-1 py-5 rounded-2xl font-black text-xl text-white tracking-wide btn-hover btn-active opacity-80 hover:opacity-100 disabled:opacity-50 disabled:cursor-not-allowed border border-gray-600">
                                    IGNORE
                                </button>
                                
                                <button @click="submitTriage('escalate', 'high')" :disabled="isTriageProcessing"
                                        class="btn-escalate flex-1 py-5 rounded-2xl font-black text-xl text-white tracking-wide btn-hover btn-active disabled:opacity-50 disabled:cursor-not-allowed">
                                    ESCALATE
                                </button>

                                <!-- Yield Module Display Panel (replacing the popup modal) -->
                                <div class="glass-panel ml-4 w-48 flex flex-col items-center justify-center rounded-2xl border-white/10 shrink-0 shadow-xl overflow-hidden relative" :class="recentScore !== null ? (recentScore > 0.5 ? 'border border-green-500/50 shadow-[0_0_20px_rgba(34,197,94,0.1)]' : 'border border-red-500/50 shadow-[0_0_20px_rgba(239,68,68,0.1)]') : ''">
                                    <div class="absolute inset-0 opacity-10 transition-colors duration-500" :class="recentScore !== null ? (recentScore > 0.5 ? 'bg-green-500' : 'bg-red-500') : ''"></div>
                                    <span class="relative text-[9px] font-black text-gray-400 tracking-[0.2em] uppercase mb-1">Yield Pos</span>
                                    <span class="relative text-4xl font-black text-white transition-all duration-300 transform scale-100" 
                                          :class="recentAnim ? 'scale-125 text-blue-400' : ''"
                                          x-text="recentScore !== null ? recentScore.toFixed(2) : '--'"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- NO EMAIL SELECTED STATE -->
                <template x-if="!selectedEmail">
                    <div class="h-full flex flex-col items-center justify-center text-center p-20 opacity-30 select-none">
                        <div class="w-16 h-16 border-4 border-gray-700 border-t-blue-500 rounded-full animate-spin mb-6"></div>
                        <h3 class="text-xl font-black uppercase tracking-widest mb-2">Awaiting Directive</h3>
                        <p class="text-xs">Select a target from the operational queue to proceed.</p>
                    </div>
                </template>
            </div>
        </div>

        <!-- SCANNER TAB -->
        <div x-show="currentTab === 'scanner'" x-cloak class="flex-1 glass-panel p-12 border-white/5 rounded-3xl overflow-y-auto">
            <h2 class="text-2xl font-black uppercase tracking-[0.2em] mb-8">Pro-Scanner</h2>
            <textarea x-model="scanText" placeholder="Paste string vector here for stateless anomaly extraction..." 
                      class="w-full h-48 bg-black/30 border border-gray-800 p-8 rounded-2xl focus:outline-none focus:border-blue-500 text-gray-300 font-mono text-sm leading-relaxed mb-6"></textarea>
            
            <button @click="runScan()" :disabled="isScanning" class="btn-reply px-10 py-4 rounded-xl font-black tracking-widest text-sm text-white hover:scale-[1.02] active:scale-95 transition-all">
                <span x-text="isScanning ? 'PROCESSING...' : 'INITIATE ANALYSIS'"></span>
            </button>

            <template x-if="scanResult">
                <div class="mt-10 p-8 glass-panel border-l-4" :class="scanResult.scam_likelihood > 0.5 ? 'border-red-500' : 'border-blue-500'">
                    <div class="flex gap-8 items-center">
                        <div class="text-center">
                            <p class="text-5xl font-black" :class="scanResult.scam_likelihood > 0.5 ? 'text-red-500' : 'text-blue-500'" x-text="(scanResult.scam_likelihood * 100).toFixed(0) + '%'"></p>
                            <p class="text-[9px] uppercase tracking-widest text-gray-500 mt-2">Threat Delta</p>
                        </div>
                        <div>
                            <p class="text-sm text-gray-300 font-bold mb-2">Suggested Override:</p>
                            <div class="flex gap-4">
                                <span class="px-4 py-1 rounded bg-black border border-gray-800 text-xs font-black uppercase text-gray-400" x-text="scanResult.suggested_action"></span>
                                <span class="px-4 py-1 rounded bg-black border border-gray-800 text-xs font-black uppercase text-gray-400" x-text="scanResult.suggested_priority"></span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- ANALYTICS TAB -->
        <div x-show="currentTab === 'analytics'" x-cloak class="flex-1 glass-panel p-12 border-white/5 rounded-3xl flex flex-col">
            <h2 class="text-2xl font-black uppercase tracking-[0.2em] mb-8 shrink-0">Analytics Yield</h2>
            <div class="flex-1 bg-black/40 rounded-2xl border border-gray-800 p-6 min-h-0 relative">
                <canvas id="yieldChart"></canvas>
            </div>
        </div>

        <!-- MATRIX TAB -->
        <div x-show="currentTab === 'matrix'" x-cloak class="flex-1 flex gap-6 min-h-0 overflow-hidden">
            <div class="glass-panel p-10 border-white/5 rounded-3xl flex-1 flex flex-col">
                <h2 class="text-2xl font-black uppercase tracking-[0.2em] mb-8 shrink-0 text-red-400">Threat Matrix Calibration</h2>
                <div class="flex-1 grid grid-cols-2 gap-8 min-h-0">
                    <!-- Radar/Radar chart -->
                    <div class="glass-panel bg-black/40 border-white/5 rounded-2xl p-6 flex flex-col items-center justify-center min-h-0 min-w-0 overflow-hidden">
                         <canvas id="radarChart"></canvas>
                    </div>
                    <!-- Stats Grid -->
                    <div class="flex flex-col gap-4">
                        <div class="glass-panel bg-black/20 p-6 rounded-2xl border-white/5">
                            <h3 class="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-4">Calibration Consistency</h3>
                            <div class="flex items-end gap-2">
                                <span class="text-4xl font-black text-white" x-text="(extended.calibration_score * 100).toFixed(0) + '%'"></span>
                                <span class="text-[10px] text-green-500 font-bold mb-1.5">OPTIMIZED</span>
                            </div>
                        </div>
                        <div class="glass-panel bg-black/20 p-6 rounded-2xl border-white/5">
                            <h3 class="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-4">Noise Impact Ratio</h3>
                            <div class="flex items-end gap-2">
                                <span class="text-4xl font-black text-white" x-text="(extended.noise_impact_ratio * 100).toFixed(0) + '%'"></span>
                                <span class="text-[10px] text-red-500 font-bold mb-1.5" x-text="extended.noise_impact_ratio > 0.5 ? 'CRITICAL NOISE' : 'SIGNAL STABLE'"></span>
                            </div>
                        </div>
                        <!-- DECEPTION EXPOSURE LIST -->
                        <div class="flex-1 glass-panel bg-black/20 p-6 rounded-2xl border-white/5 overflow-y-auto">
                            <h3 class="text-[10px] font-black uppercase text-gray-500 tracking-widest mb-4">Deception Exposure History</h3>
                            <div class="flex flex-wrap gap-2">
                                <template x-for="(count, type) in extended.deception_exposure" :key="type">
                                    <div class="px-3 py-1.5 bg-red-900/20 border border-red-500/20 rounded text-[10px] font-black uppercase text-red-400" 
                                         x-text="type + ': ' + count"></div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- AGENT CONSOLE (Right side of matrix) -->
            <div class="w-96 glass-panel border-white/5 bg-black/60 rounded-3xl flex flex-col overflow-hidden">
                <div class="p-6 border-b border-white/5 flex justify-between items-center bg-gray-900/40">
                    <span class="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em]">Operational Console</span>
                    <div class="flex gap-1.5">
                        <div class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-yellow-500"></div>
                        <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 font-mono text-[10px] flex flex-col gap-2">
                    <template x-for="log in extended.recent_logs" :key="log.step">
                        <div class="p-2 rounded bg-white/5 border-l-2" :class="log.noise_applied ? 'border-red-500' : 'border-blue-500'">
                            <p class="text-blue-400 font-bold mb-1" x-text="'[OP_' + log.step + '] ACTION: ' + log.action.decision.toUpperCase()"></p>
                            <p class="text-gray-400" x-text="'-> True: ' + log.true_reward.toFixed(2) + ' | Feed: ' + log.feedback_reward.toFixed(2)"></p>
                            <p x-show="log.noise_applied" class="text-red-500 text-[8px] mt-1" x-text="'!! NOISE DETECTED: ' + log.noise_profile"></p>
                        </div>
                    </template>
                </div>
            </div>
        </div>

    </main>

    <!-- FLOATING NOTIFICATION -->
    <div x-show="notif.show" x-transition.opacity.duration.300ms class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[400] glass-panel px-6 py-3 rounded-full border-blue-500/50 flex items-center gap-3 backdrop-blur-3xl shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
        <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
        <span class="font-bold text-xs uppercase tracking-widest text-blue-100" x-text="notif.text"></span>
    </div>

    <!-- LOGIC SCRIPT -->
    <script>
        function triageApp() {
            return {
                currentTab: 'simulation',
                selectedTask: 'easy',
                inbox: [],
                selectedEmail: null,
                perf: { total_score: 0, current_streak: 0, rank: 'NOVICE ANALYST', progress_percent: 0 },
                extended: { action_distribution: {}, noise_impact_ratio: 0, calibration_score: 0, consistency_rating: 0, deception_exposure: {}, recent_logs: [] },
                
                scanText: '',
                scanResult: null,
                isScanning: false,
                isTriageProcessing: false,
                
                recentScore: null,
                recentAnim: false,
                
                historyYields: [],
                chartInstance: null,
                radarInstance: null,
                notif: { show: false, text: '' },

                initApp() {
                    this.loadInbox();
                    this.updateExtended();
                    this.notify("System Online. Neural Link established.");
                },

                notify(msg) {
                    this.notif.text = msg;
                    this.notif.show = true;
                    setTimeout(() => { this.notif.show = false; }, 3500);
                },

                async updateExtended() {
                    try {
                        const res = await fetch('/api/analytics/extended');
                        this.extended = await res.json();
                        if(this.currentTab === 'matrix') this.updateRadar();
                    } catch (e) {
                         console.warn("Extended sync failed", e);
                    }
                },

                async updatePerf() {
                    try {
                        const res = await fetch('/api/performance');
                        this.perf = await res.json();
                        this.updateExtended();
                    } catch (e) {
                         console.warn("Performance sync failed", e);
                    }
                },


                async loadInbox() {
                    try {
                        let taskType = this.selectedTask;
                        if(taskType === 'gmail') {
                            // If they clicked Live Telemetry, automatically try to fetch real emails if needed
                            // For simplicity, we just trigger the inbox load. In a real scenario we'd call /api/gmail/fetch here first.
                        }

                        const endpoint = `/api/inbox/${taskType}`;
                        const res = await fetch(endpoint);
                        this.inbox = await res.json();
                        
                        this.selectedEmail = null;
                        this.recentScore = null;
                        this.historyYields = [];
                        
                        // Send Reset POST to backend to sync standard environment tracking
                        await fetch('/reset', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ task: taskType, mode: 'infinite' })
                        });
                        
                        await this.updatePerf();
                        this.updateChart();
                    } catch (e) {
                        this.notify("Sync Error: " + e.message);
                    }
                },

                openEmail(email) {
                    this.selectedEmail = email;
                    this.recentScore = null;
                },

                openAnalytics() {
                    this.currentTab = 'analytics';
                    setTimeout(() => { this.initChart(); }, 50);
                },

                openMatrix() {
                    this.currentTab = 'matrix';
                    setTimeout(() => { 
                        this.initRadar();
                        this.updateExtended();
                    }, 50);
                },

                initRadar() {
                    const ctx = document.getElementById('radarChart');
                    if(!ctx) return;
                    if(this.radarInstance) this.radarInstance.destroy();

                    const data = {
                        labels: ['Reply Speed', 'Escalation Recall', 'Ignore Precision', 'Noise Resistance', 'Calibration'],
                        datasets: [{
                            label: 'Agent Vectors',
                            data: [
                                this.extended.consistency_rating * 100,
                                (this.extended.action_distribution.escalate || 0) * 10,
                                (this.extended.action_distribution.ignore || 0) * 10,
                                (1.0 - this.extended.noise_impact_ratio) * 100,
                                this.extended.calibration_score * 100
                            ],
                            fill: true,
                            backgroundColor: 'rgba(239, 68, 68, 0.2)',
                            borderColor: 'rgb(239, 68, 68)',
                            pointBackgroundColor: 'rgb(239, 68, 68)',
                            pointBorderColor: '#fff',
                        }]
                    };

                    this.radarInstance = new Chart(ctx, {
                        type: 'radar',
                        data: data,
                        options: {
                            elements: { line: { borderWidth: 3 } },
                            plugins: { legend: { display: false } },
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(255,255,255,0.05)' },
                                    grid: { color: 'rgba(255,255,255,0.1)' },
                                    pointLabels: { color: '#9ca3af', font: { size: 10, weight: 'bold' } },
                                    ticks: { display: false, stepSize: 20 },
                                    suggestedMin: 0,
                                    suggestedMax: 100
                                }
                            }
                        }
                    });
                },

                updateRadar() {
                    if(this.radarInstance) {
                        this.radarInstance.data.datasets[0].data = [
                            this.extended.consistency_rating * 100,
                            (this.extended.action_distribution.escalate || 0) * 10,
                            (this.extended.action_distribution.ignore || 0) * 10,
                            (1.0 - this.extended.noise_impact_ratio) * 100,
                            this.extended.calibration_score * 100
                        ];
                        this.radarInstance.update();
                    }
                },


                // --- CHART LOGIC KEEP IDENTICAL TO FIXES ---
                initChart() {
                    const ctx = document.getElementById('yieldChart');
                    if(!ctx) return;
                    if(this.chartInstance) this.chartInstance.destroy();
                    
                    Chart.defaults.color = '#4b5563';
                    Chart.defaults.font.family = 'Inter';
                    
                    this.chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: this.historyYields.map((_, i) => 'Op ' + (i+1)),
                            datasets: [{
                                label: 'XP Yield',
                                data: this.historyYields,
                                borderColor: '#3b82f6',
                                backgroundColor: 'rgba(59, 130, 246, 0.1)',
                                borderWidth: 2,
                                fill: true,
                                tension: 0.3,
                                pointBackgroundColor: '#60a5fa',
                                pointRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true, max: 1.0 },
                                x: { grid: { display: false } }
                            }
                        }
                    });
                },

                updateChart() {
                    if(this.chartInstance) {
                        try {
                            this.chartInstance.data.labels = this.historyYields.map((_, i) => 'Op ' + (i+1));
                            this.chartInstance.data.datasets[0].data = this.historyYields;
                            this.chartInstance.update();
                        } catch(e) { /* Hidden tabs chart error ignored */ }
                    }
                },

                // --- CORE TRIAGE LOGIC ---
                async submitTriage(decision, priority) {
                    if(!this.selectedEmail || this.isTriageProcessing) return;
                    this.isTriageProcessing = true;
                    
                    try {
                        const res = await fetch('/step', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ decision, priority, email_id: this.selectedEmail.id })
                        });
                        const data = await res.json();
                        
                        this.historyYields.push(data.reward);
                        this.updateChart();
                        
                        // Silent update
                        this.recentScore = data.reward;
                        this.recentAnim = true;
                        setTimeout(() => { this.recentAnim = false; }, 300);
                        
                        await this.updatePerf();
                        
                        // Progress to next email smoothly
                        const currentIndex = this.inbox.findIndex(e => e.id === this.selectedEmail.id);
                        setTimeout(() => {
                            if(currentIndex > -1 && currentIndex < this.inbox.length - 1) {
                                this.selectedEmail = this.inbox[currentIndex + 1];
                            } else if (currentIndex === this.inbox.length - 1) {
                                // Reached end of batch, soft pull again if needed or stay empty
                                this.selectedEmail = null;
                            }
                            this.isTriageProcessing = false;
                        }, 800);
                        
                    } catch (e) {
                        this.notify("API Error: " + (e.message || String(e)));
                        this.isTriageProcessing = false;
                    }
                },

                // --- SCAN LOGIC ---
                async runScan() {
                    if(!this.scanText) return;
                    this.isScanning = true;
                    try {
                        const res = await fetch('/api/scan', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({text: this.scanText})
                        });
                        this.scanResult = await res.json();
                    } catch (e) {
                        this.notify("Scan offline.");
                    }
                    this.isScanning = false;
                }
            }
        }
    </script>
</body>
</html>
