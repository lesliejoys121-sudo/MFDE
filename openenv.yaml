name: MFDE-Email-Triage
version: "2.0.0"
description: "Misleading Feedback Decision Environment: High-fidelity email triage with calibrated (0.02, 0.98) scoring."
tags: [openenv, nlp, classification, uncertainty, calibration, gmail]
observation_space:
  email_text: {type: string}
  sender:     {type: string}
  subject:    {type: string}
  step_count: {type: integer, range: [0, 10]}
action_space:
  decision: {type: string, options: [reply, ignore, escalate]}
  priority: {type: string, options: [low, medium, high]}
reward:
  type: float
  range: [0.0, 1.0]
tasks:
  - name: easy
    grader: deterministic
    steps: 5
    description: "Clear signals, no noise. 5 straightforward triage emails."
  - name: medium
    grader: deterministic
    steps: 7
    description: "Some misleading emails (CEO fraud, fake urgency), ~30% reward noise."
  - name: hard
    grader: deterministic
    steps: 10
    description: "Highly deceptive emails, ambiguous signals, ~50% reward noise."
  - name: stress_test
    grader: deterministic
    steps: 20
    description: "Maximum signal variance, 70% misleading noise, 20 target vectors."

endpoints:
  reset:         {method: POST, path: /reset}
  step:          {method: POST, path: /step}
  state:         {method: GET,  path: /state}
  gmail_fetch:   {method: POST, path: /api/gmail/fetch}
  gmail_triage:  {method: POST, path: /api/gmail/triage}
  scan:          {method: POST, path: /api/scan}
env_vars:
  ANTHROPIC_API_KEY: "Required for Gmail triage and AI inference"
  GMAIL_MCP_URL:     "Gmail MCP server URL (default: https://gmail.mcp.claude.com/mcp)"
